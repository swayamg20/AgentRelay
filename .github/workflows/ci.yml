name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm -r typecheck

  unit:
    needs: lint-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Skip the e2e workspace — it needs Postgres + builds + a real
      # relay subprocess and is covered by the dedicated `e2e` job.
      - run: pnpm --filter relay --filter agentrelay-mcp test

  relay-integration:
    needs: lint-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentrelay
          POSTGRES_PASSWORD: agentrelay-dev
          POSTGRES_DB: agentrelay
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U agentrelay -d agentrelay"
          --health-interval 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - run: pnpm install --frozen-lockfile

      # Apply migrations against the fresh Postgres service container
      # before the per-file integration loop. The loop's TRUNCATE step
      # assumes the schema exists; on a clean DB the first truncate
      # would fail with `relation "agents" does not exist`. Drizzle
      # migrate is idempotent.
      - run: node --import tsx/esm relay/src/db/migrate.ts
        env:
          RELAY_DATABASE_URL: postgres://agentrelay:agentrelay-dev@localhost:5433/agentrelay

      - run: pnpm --filter relay test:integration
        env:
          RELAY_TEST_DATABASE_URL: postgres://agentrelay:agentrelay-dev@localhost:5433/agentrelay
          RELAY_TEST_TRUNCATE_VIA_PSQL: '1'

  e2e:
    needs: [unit, relay-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentrelay
          POSTGRES_PASSWORD: agentrelay-dev
          POSTGRES_DB: agentrelay
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U agentrelay -d agentrelay"
          --health-interval 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Apply migrations once before the e2e tests — TestRelay.boot()
      # spawns the relay against this DB and the harness expects the
      # schema to exist. Drizzle migrate is idempotent.
      - run: node --import tsx/esm relay/src/db/migrate.ts
        env:
          RELAY_DATABASE_URL: postgres://agentrelay:agentrelay-dev@localhost:5433/agentrelay

      - run: pnpm --filter agentrelay-e2e test
        env:
          RELAY_TEST_DATABASE_URL: postgres://agentrelay:agentrelay-dev@localhost:5433/agentrelay
